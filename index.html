<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0f14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tycoon" />
  <title>Tycoon — Idle Business Empire</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app" class="app">

    <!-- Top bar: balance + income/sec -->
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand-block">
          <div class="brand">TYCOON</div>
          <div id="levelBadge" class="level-badge">LV 1</div>
        </div>
        <div class="balance-block">
          <div id="balanceValue" class="balance">$0</div>
          <div class="income"><span id="incomeRate">$0/s</span> passive</div>
        </div>
      </div>
    </header>

    <!-- Active tab content is rendered here -->
    <main id="tabBody" class="tab-body"></main>

    <!-- Bottom navigation (populated by ui.js) -->
    <nav id="bottomNav" class="bottom-nav"></nav>
  </div>

  <!-- Scripts: order matters (dependencies load before consumers) -->
  <script src="js/format.js"></script>
  <script src="js/chart.js"></script>
  <script src="js/logos.js"></script>
  <script src="js/data/businesses.js"></script>
  <script src="js/data/progression.js"></script>
  <script src="js/data/markets.js"></script>
  <script src="js/data/stocks.js"></script>
  <script src="js/data/assets.js"></script>
  <script src="js/state.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/mechanics.js"></script>
  <script src="js/progression.js"></script>
  <script src="js/market.js"></script>
  <script src="js/assets.js"></script>
  <script src="js/tap.js"></script>
  <script src="js/businesses.js"></script>
  <script src="js/invest.js"></script>
  <script src="js/assetstab.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
